<th:block th:replace="~{layout :: layout(titulo='Animales', contenido=~{:: #contenido})}">
    <div id="contenido">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <h1 class="display-5 fw-bold mb-4 text-center">Listado de Animales</h1>
                    <form method="get" action="/animales" class="row g-3 mb-4 justify-content-center">
                        <div class="col-auto">
                            <input type="text" name="tipo" class="form-control" placeholder="Filtrar por tipo" th:value="${tipoSeleccionado}">
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-primary">Filtrar</button>
                            <a href="/animales" class="btn btn-secondary">Limpiar</a>
                        </div>
                    </form>
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Descripción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="animal : ${animales}">
                                <td th:text="${animal.nombre}"></td>
                                <td th:text="${animal.tipo}"></td>
                                <td th:text="${animal.descripcion}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="text-center mt-3">
                        <a href="/" class="btn btn-outline-primary">Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>
