<th:block th:replace="~{layout :: layout(titulo='Saludo', contenido=~{:: #contenido})}">
    <div id="contenido">
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center">
                    <h1 class="display-4 fw-bold mb-4">Hola, <span th:text="${nombre}"></span>!</h1>
                    <a href="/" class="btn btn-outline-primary">Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</th:block>
