<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es" th:fragment="layout(titulo, contenido)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">proyecto-09</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#request.requestURI == '/' ? 'active' : ''}" href="/">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#request.requestURI.startsWith('/animales') ? 'active' : ''}" href="/animales">Animales</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#request.requestURI.startsWith('/dado') ? 'active' : ''}" href="/dado">Dado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${#request.requestURI.startsWith('/contador') ? 'active' : ''}" href="/contador">Contador</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="flex-shrink-0">
        <th:block th:replace="${contenido}" />
    </main>
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> proyecto-09. Spring Boot + Thymeleaf.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <th:block th:if="${scripts != null}" th:replace="${scripts}" />
</body>
</html>
